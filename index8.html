<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Microsoft Edge | Depth Scroll</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
  <script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>

  <style>
    :root {
      --bg-gradient: radial-gradient(circle at 50% 50%, #d1d8e0 0%, #b8bfc9 50%, #a1aab4 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    body {
      background: #b8bfc9;
      overflow-x: hidden;
      color: #333;
    }

    .stage {
      height: 100vh;
      width: 100vw;
      position: fixed;
      top: 0;
      left: 0;
      perspective: 1000px;
      background: var(--bg-gradient);
      overflow: hidden;
    }

    /* Background blur blobs to match images */
    .stage::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 15% 20%, rgba(225, 107, 95, 0.15), transparent 35%),
        radial-gradient(circle at 85% 80%, rgba(64, 115, 158, 0.15), transparent 35%);
      filter: blur(80px);
    }

    .card-container {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }

    .card {
      position: absolute;
      top: 50%;
      /* Positioned relative to their side in JS */
      width: 550px;
      height: 350px;
      margin-top: -175px; /* Center vertically */
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(25px) saturate(150%);
      -webkit-backdrop-filter: blur(25px) saturate(150%);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 28px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.08);
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      will-change: transform, opacity;
    }

    .month-tag {
      align-self: flex-start;
      background: #e16b5f;
      color: white;
      font-size: 11px;
      font-weight: 800;
      padding: 5px 14px;
      border-radius: 8px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .card h1 {
      font-size: 38px;
      margin-bottom: 12px;
      color: #111;
    }

    .card p {
      font-size: 17px;
      line-height: 1.5;
      color: #333;
    }

    .try-btn {
      margin-top: 30px;
      background: #222;
      color: white;
      padding: 10px 24px;
      border-radius: 12px;
      font-size: 14px;
      width: fit-content;
    }

    /* UI Overlay */
    .footer-ui {
      position: absolute;
      bottom: 30px;
      width: 100%;
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
      opacity: 0.8;
    }

    .nav-group {
      display: flex;
      gap: 12px;
    }

    .nav-item {
      background: rgba(255,255,255,0.8);
      height: 54px;
      padding: 0 25px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      font-weight: 600;
    }

    .spacer { height: 800vh; }
  </style>
</head>
<body>

  <div class="stage">
    <div class="card-container" id="cardContainer"></div>

    <div class="footer-ui">
      <div class="brand">
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/Microsoft_Edge_logo_%282019%29.svg" width="22">
        Microsoft Edge | 2025 Year in Review
      </div>
      
      <div class="nav-group">
        <div class="nav-item">←</div>
        <div class="nav-item">Next →</div>
      </div>

      <div class="nav-item" id="progressLabel">Progress 0%</div>
    </div>
  </div>

  <div class="spacer"></div>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const data = [
      { month: "JANUARY", title: "Copilot", text: "Copilot in Edge helped millions of people create content via chat and voice." },
      { month: "FEBRUARY", title: "Translation", text: "Edge helped people consume content—translating nearly 70 trillion characters this year!" },
      { month: "MARCH", title: "Video summary", text: "In March, we launched video summaries to make content easier to digest." },
      { month: "APRIL", title: "Efficiency", text: "Edge saved users more battery life than any other browser in 2025." },
      { month: "MAY", title: "Security", text: "SmartScreen blocked over 5 billion phishing attacks this year." },
      { month: "JUNE", title: "Gaming", text: "Clarity Boost made cloud gaming sharper and more vibrant for everyone." }
    ];

    const container = document.getElementById("cardContainer");
    
    // Create and position cards
    data.forEach((item, i) => {
      const isEven = (i + 1) % 2 === 0;
      const card = document.createElement("div");
      card.className = "card";
      
      // Fixed horizontal positions: Even on Left (20%), Odd on Right (80%)
      // Using left: 50% and xPercent to handle the "off-center" look
      if (isEven) {
        card.style.left = "15%"; 
      } else {
        card.style.left = "55%";
      }

      card.innerHTML = `
        <span class="month-tag" style="background: ${isEven ? '#7a8c99' : '#e16b5f'}">${item.month}</span>
        <h1>${item.title}</h1>
        <p>${item.text}</p>
        <div class="try-btn">Try now</div>
      `;
      container.appendChild(card);
    });

    const cards = gsap.utils.toArray(".card");

    // Initialize the Z-stack
    // We start them far back in the "tunnel"
    gsap.set(cards, {
      z: (i) => -i * 1500,
      opacity: (i) => i === 0 ? 1 : 0,
      filter: "blur(10px)"
    });

    // Master Timeline
    const mainTimeline = gsap.timeline({
      scrollTrigger: {
        trigger: ".spacer",
        start: "top top",
        end: "bottom bottom",
        scrub: 1.5,
        onUpdate: (self) => {
          document.getElementById("progressLabel").innerText = `Progress ${Math.round(self.progress * 100)}%`;
        }
      }
    });

    cards.forEach((card, i) => {
      // 1. Entrance: Bring from background into focus
      mainTimeline.to(card, {
        opacity: 1,
        filter: "blur(0px)",
        z: 0,
        duration: 1,
        ease: "power2.out"
      }, i); // Start at the index time

      // 2. Exit: Fly past the camera
      mainTimeline.to(card, {
        opacity: 0,
        z: 1000, 
        filter: "blur(20px)",
        duration: 1,
        ease: "power2.in"
      }, i + 0.8); // Start exit slightly before next card reaches center
    });

  </script>
</body>
</html>
